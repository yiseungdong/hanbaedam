<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 — 한백담</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .mypage { max-width: 860px; margin: 0 auto; padding: 52px 24px 80px; }
    .mypage__title { font-size: 26px; margin-bottom: 36px; }

    /* 탭 */
    .mypage-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--gray-lt); margin-bottom: 36px; }
    .mypage-tab {
      font-size: 13px; padding: 12px 24px; background: none; border: none;
      color: var(--text-lt); cursor: pointer; font-family: var(--sans);
      border-bottom: 2px solid transparent; transition: all .2s; letter-spacing: 0.04em;
    }
    .mypage-tab.active { color: var(--green); border-bottom-color: var(--green); font-weight: 500; }
    .mypage-panel { display: none; }
    .mypage-panel.active { display: block; }

    /* 프로필 */
    .profile-card {
      background: var(--bg2); border-radius: var(--radius); padding: 28px 32px;
      display: flex; align-items: center; gap: 24px; margin-bottom: 32px;
    }
    .profile-avatar {
      width: 64px; height: 64px; border-radius: 50%; background: var(--green);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--serif); font-size: 24px; color: var(--bg); flex-shrink: 0;
    }
    .profile-info__name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .profile-info__id { font-size: 12px; color: var(--gray); letter-spacing: 0.04em; }
    .profile-info__date { font-size: 11px; color: var(--gray-lt); margin-top: 4px; }

    /* 배송지 폼 */
    .address-section { margin-bottom: 36px; }
    .address-section h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; font-family: var(--serif); }
    .form-group { margin-bottom: 16px; }
    .form-group label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-md); letter-spacing: 0.06em; margin-bottom: 6px;
    }
    .form-group input, .form-group textarea {
      width: 100%; padding: 11px 14px; font-size: 13px; font-family: var(--sans);
      border: 1px solid var(--gray-lt); border-radius: var(--radius);
      background: #fff; color: var(--text); outline: none; transition: border-color .2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--green); }
    .form-group textarea { resize: vertical; min-height: 60px; }
    .form-row { display: flex; gap: 8px; }
    .form-row input { flex: 1; }
    .btn--addr {
      flex-shrink: 0; padding: 11px 16px; font-size: 12px; font-family: var(--sans);
      background: var(--bg2); color: var(--text-md); border: 1px solid var(--gray-lt);
      border-radius: var(--radius); cursor: pointer; white-space: nowrap; transition: all .2s;
    }
    .btn--addr:hover { background: var(--green); color: var(--bg); border-color: var(--green); }
    .save-addr {
      display: flex; align-items: center; gap: 8px; margin-top: 12px;
      font-size: 13px; color: var(--text-md);
    }
    .save-addr input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--green); }

    /* 주문 요약 */
    .order-summary { margin-bottom: 36px; }
    .order-summary h3 { font-size: 16px; font-weight: 500; margin-bottom: 20px; font-family: var(--serif); }
    .order-item {
      display: flex; gap: 16px; align-items: center; padding: 14px 0;
      border-bottom: 0.5px solid var(--gray-lt);
    }
    .order-item__img {
      width: 56px; height: 56px; border-radius: var(--radius); flex-shrink: 0;
    }
    .order-item__name { font-size: 13px; font-weight: 500; margin-bottom: 2px; }
    .order-item__detail { font-size: 12px; color: var(--gray); }
    .order-item__price { margin-left: auto; font-size: 14px; font-weight: 500; }
    .order-empty { text-align: center; padding: 40px 0; color: var(--gray); font-size: 14px; }

    /* 결제 요약 */
    .payment-box {
      background: var(--bg2); border-radius: var(--radius); padding: 24px 28px;
      margin-bottom: 24px;
    }
    .payment-row {
      display: flex; justify-content: space-between; font-size: 13px;
      padding: 8px 0; color: var(--text-md);
    }
    .payment-row.total {
      font-size: 16px; font-weight: 500; color: var(--text);
      border-top: 1px solid var(--gray-lt); margin-top: 12px; padding-top: 16px;
    }
    .payment-row.total span:last-child { color: var(--green); }
    .btn--pay {
      width: 100%; padding: 15px; font-size: 14px; font-family: var(--sans);
      font-weight: 500; background: var(--green); color: var(--bg); border: none;
      border-radius: var(--radius); cursor: pointer; letter-spacing: 0.08em;
      transition: background .2s;
    }
    .btn--pay:hover { background: #1e4430; }
    .btn--pay:disabled { background: var(--gray-lt); cursor: not-allowed; }

    /* 주문 내역 탭 */
    .order-history-item {
      border: 0.5px solid var(--gray-lt); border-radius: var(--radius);
      padding: 20px 24px; margin-bottom: 16px;
    }
    .order-history-item__header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 12px;
    }
    .order-history-item__number { font-size: 13px; font-weight: 500; }
    .order-history-item__date { font-size: 12px; color: var(--gray); }
    .order-history-item__status {
      font-size: 11px; padding: 4px 10px; border-radius: 2px;
      letter-spacing: 0.06em;
    }
    .status--pending { background: #FFF3CD; color: #856404; }
    .status--shipping { background: #D1ECF1; color: #0C5460; }
    .status--done { background: #D4EDDA; color: #155724; }
    .order-history-empty {
      text-align: center; padding: 60px 0; color: var(--gray); font-size: 14px;
    }

    .alert {
      padding: 12px 16px; border-radius: var(--radius); font-size: 13px;
      margin-bottom: 20px; display: none;
    }
    .alert--error { background: #fdf0ef; color: #c0392b; border: 1px solid #f5c6cb; }
    .alert--success { background: #e8f5e9; color: var(--green); border: 1px solid #c8e6c9; }

    @media (max-width: 768px) {
      .profile-card { flex-direction: column; text-align: center; }
      .mypage-tabs { overflow-x: auto; }
      .mypage-tab { padding: 12px 16px; white-space: nowrap; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav__logo">한백담<span>HANBAEDAM</span></a>
    <ul class="nav__links">
      <li><a href="products.html">상품</a></li>
      <li><a href="about.html">브랜드 스토리</a></li>
      <li><a href="producers.html">생산자</a></li>
      <li><a href="gift.html">선물하기</a></li>
    </ul>
    <div class="nav__right">
      <a href="cart.html" class="nav__cart" id="cart-count">장바구니 0</a>
    </div>
  </nav>

  <div class="mypage">
    <h1 class="mypage__title serif">마이페이지</h1>

    <div class="alert alert--success" id="alert-success"></div>
    <div class="alert alert--error" id="alert-error"></div>

    <!-- 프로필 카드 -->
    <div class="profile-card">
      <div class="profile-avatar" id="profile-avatar"></div>
      <div>
        <div class="profile-info__name" id="profile-name"></div>
        <div class="profile-info__id" id="profile-id"></div>
      </div>
    </div>

    <!-- 주문 내역 -->
    <div id="order-history" style="margin-top:8px;"></div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer__top">
      <div class="footer__logo">한백담<span>HANBAEDAM · 韓白潭</span></div>
      <div class="footer__links">
        <a href="#">이용약관</a>
        <a href="#">개인정보처리방침</a>
        <a href="#">고객센터</a>
      </div>
    </div>
    <div class="footer__copy">
      상호: 한백담 | 대표자: ○○○ | 사업자등록번호: 000-00-00000 | 통신판매업신고번호: 제0000-강원홍천-0000호<br>
      주소: 강원특별자치도 홍천군 ○○면 ○○로 000 | 고객센터: 000-0000-0000 | 이메일: hello@hanbaedam.com<br>
      &copy; 2025 HANBAEDAM. All rights reserved.
    </div>
  </footer>

  <!-- 다음 카카오 주소 API -->
  <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
  <script src="js/main.js"></script>
  <script>
    // 로그인 체크
    const user = JSON.parse(localStorage.getItem('hb_user') || 'null');
    if (!user) {
      alert('로그인이 필요합니다.');
      location.href = 'login.html';
    }

    // 프로필 렌더
    if (user) {
      document.getElementById('profile-avatar').textContent = (user.name || '').charAt(0);
      document.getElementById('profile-name').textContent = user.name + '님';
      document.getElementById('profile-id').textContent = '@' + user.username;
    }

    // 택배사 조회 URL
    const COURIER_URLS = {
      'CJ대한통운': 'https://www.cjlogistics.com/ko/tool/parcel/tracking?gnbInvcNo=',
      '롯데택배': 'https://www.lotteglogis.com/home/reservation/tracking/index?InvNo=',
      '우체국': 'https://service.epost.go.kr/trace.RetrieveDomRigiTraceList.comm?sid1=',
      '한진택배': 'https://www.hanjin.com/kor/CMS/DeliveryMgr/WaybillResult.do?mCode=MN038&schLang=KR&wblnumText2='
    };

    // 주문내역 로드
    function loadOrderHistory() {
      const container = document.getElementById('order-history');
      const token = localStorage.getItem('hb_token');
      if (!token) {
        container.innerHTML = '<div class="order-history-empty">로그인이 필요합니다</div>';
        return;
      }
      fetch('/api/orders/my', { headers: { 'Authorization': `Bearer ${token}` } })
        .then(res => res.json())
        .then(orders => {
          if (!orders.length) {
            container.innerHTML = '<div class="order-history-empty">주문 내역이 없습니다</div>';
            return;
          }
          container.innerHTML = orders.map(o => {
            const statusClass = o.status === '배송완료' ? 'status--done'
              : o.status === '배송중' ? 'status--shipping' : 'status--pending';
            const items = Array.isArray(o.items) ? o.items : [];
            const itemNames = items.map(i => i.name || '상품').join(', ');
            const trackingBtn = o.tracking_number && o.courier
              ? `<a href="${COURIER_URLS[o.courier] || '#'}${o.tracking_number}" target="_blank"
                   style="display:inline-block;margin-top:8px;padding:6px 14px;background:var(--green);color:var(--bg);border-radius:2px;text-decoration:none;font-size:12px;letter-spacing:0.04em;">
                   배송조회 (${o.courier})</a>` : '';
            return `
              <div class="order-history-item">
                <div class="order-history-item__header">
                  <div>
                    <div class="order-history-item__number">${o.order_number}</div>
                    <div class="order-history-item__date">${(o.created_at || '').split('T')[0]}</div>
                  </div>
                  <span class="order-history-item__status ${statusClass}">${o.status}</span>
                </div>
                <div style="font-size:13px;color:var(--text-md);">${itemNames}</div>
                <div style="font-size:14px;font-weight:500;margin-top:8px;">${Number(o.total_price).toLocaleString()}원</div>
                ${trackingBtn}
              </div>`;
          }).join('');
        })
        .catch(() => {
          container.innerHTML = '<div class="order-history-empty">주문 내역을 불러올 수 없습니다</div>';
        });
    }

    // 페이지 로드 시 주문내역 표시
    loadOrderHistory();

    function showAlert(type, msg) {
      const errEl = document.getElementById('alert-error');
      const sucEl = document.getElementById('alert-success');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';
      if (type === 'error') { errEl.textContent = msg; errEl.style.display = 'block'; }
      else { sucEl.textContent = msg; sucEl.style.display = 'block'; }
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
